version: '3.8'

# Масштабирование приложения (Round Robin через nginx):
#   docker compose -p vkr_test up -d --scale app=3
# nginx автоматически подхватывает все реплики сервиса app через Docker DNS.

x-app-service: &app-service
  build: ./backend
  command: python manage.py runserver 0.0.0.0:8000
  env_file:
    - .env
  volumes:
    - ./backend:/app
  environment:
    - DEBUG=1
  expose:
    - "8000"
  restart: unless-stopped
  networks:
    - backend
  depends_on:
    - db
  healthcheck:
    test:
      [
        "CMD",
        "python",
        "-c",
        "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/ping/', timeout=3)",
      ]
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 45s

services:
  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - backend

  app:
    <<: *app-service

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
