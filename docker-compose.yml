version: '3.8'

services:
  db:
    image: postgres:15
    env_file:
      - .env  # Передаем переменные в базу
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
    depends_on:
      - db

volumes:
  postgres_data: